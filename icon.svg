<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#e8f5e9"/>
      <stop offset="0.35" stop-color="#f1f8e9"/>
      <stop offset="0.7"  stop-color="#fefef6"/>
      <stop offset="1"    stop-color="#faf6ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#5AAF6A" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#5AAF6A" stop-opacity="0.08"/>
      <stop offset="1"   stop-color="#5AAF6A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="16" fill="#5AAF6A"/>
  <circle cx="256" cy="256" r="16" fill="#5AAF6A" opacity="0.35">
    <animate attributeName="r" values="16;44;16" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0;0.35" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="256" y="360"
        text-anchor="middle"
        font-family="Georgia, 'Noto Serif TC', serif"
        font-size="56"
        font-weight="400"
        letter-spacing="14"
        fill="#2D8659">IT RUNS</text>
  <text x="256" y="410"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="18"
        letter-spacing="6"
        fill="#B8860B"
        opacity="0.8">SYNTAX FIELD</text>
</svg>
