<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>剪刀 · 石頭 · 布 — 真的 Claude 在另一頭</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold:#c9a84c;--gold-soft:rgba(201,168,76,.55);--bg:#0a0f0b;--text:#e9e2cd;
    --faint:rgba(233,226,205,.5);--line:rgba(201,168,76,.20);--panel:rgba(201,168,76,.035);
    --serif:'Cormorant Garamond',Georgia,serif;--mono:'DM Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{min-height:100vh;background:var(--bg);
    background-image:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,.10), transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%, rgba(60,90,70,.18), transparent 60%);
    color:var(--text);font-family:var(--serif);padding:44px 20px 64px;display:flex;justify-content:center;position:relative;overflow-x:hidden;}
  .wrap{width:100%;max-width:560px;position:relative;z-index:1;}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.34em;color:var(--gold-soft);text-transform:uppercase;margin-bottom:14px;text-align:center;}
  .title{font-size:42px;line-height:1.08;font-weight:500;letter-spacing:.03em;text-align:center;}
  .sub{font-family:var(--mono);font-size:12.5px;color:var(--faint);margin:16px 0 30px;line-height:1.7;text-align:center;}
  .score{display:flex;border:1px solid var(--line);border-radius:2px;overflow:hidden;margin-bottom:26px;background:var(--panel);}
  .score .cell{flex:1;padding:16px 8px;text-align:center;border-left:1px solid var(--line);}
  .score .cell:first-child{border-left:none;}
  .score .lab{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--faint);text-transform:uppercase;margin-bottom:6px;}
  .score .num{font-size:34px;color:var(--gold);font-weight:500;}
  .stage{min-height:172px;border:1px solid var(--line);border-radius:2px;background:var(--panel);display:flex;align-items:center;justify-content:center;padding:22px;margin-bottom:26px;text-align:center;}
  .stage.armed{animation:sfGlow 1.6s ease-in-out infinite;}
  .hand{display:flex;align-items:center;justify-content:space-around;}
  .hand .g{font-size:40px;}.hand .z{font-size:22px;margin-top:4px;}
  .hand .who{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.2em;margin-top:2px;}
  .vs{font-family:var(--mono);font-size:13px;color:var(--gold-soft);letter-spacing:.2em;}
  .result{margin-top:16px;font-size:28px;letter-spacing:.08em;}
  .quip{margin-top:6px;font-family:var(--mono);font-size:12px;color:var(--faint);font-style:italic;}
  .hint{font-family:var(--mono);font-size:13px;color:var(--faint);letter-spacing:.16em;line-height:1.8;}
  .reveal-anim{animation:sfUp .45s ease both;width:100%;}
  .row{display:flex;gap:12px;margin-bottom:18px;}
  button.move,button.arm{flex:1;background:transparent;border:1px solid var(--line);border-radius:2px;color:var(--text);padding:20px 6px 16px;cursor:pointer;font-family:var(--serif);transition:transform .18s ease,background .25s ease,box-shadow .25s ease,border-color .25s ease;}
  button.arm{padding:18px 6px;font-size:18px;letter-spacing:.06em;}
  button.move .g{font-size:30px;}button.move .z{font-size:19px;margin-top:6px;}
  button.move .en{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.22em;text-transform:uppercase;margin-top:3px;}
  button:hover{transform:translateY(-3px);background:rgba(201,168,76,.08);border-color:var(--gold-soft);box-shadow:0 8px 30px rgba(0,0,0,.4);}
  button:active{transform:translateY(-1px) scale(.99);}
  button:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .hist-head{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--gold-soft);text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .reset{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--faint);background:transparent;border:1px solid var(--line);border-radius:2px;padding:4px 10px;cursor:pointer;flex:none;}
  .reset:hover{transform:none;box-shadow:none;}
  .scroll{max-height:220px;overflow-y:auto;padding-right:4px;}
  .scroll::-webkit-scrollbar{width:6px;}.scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .hrow{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px;}
  .foot{margin-top:28px;font-family:var(--mono);font-size:10.5px;color:rgba(233,226,205,.34);text-align:center;line-height:1.9;letter-spacing:.04em;}
  .err{font-family:var(--mono);font-size:12px;color:#d98c7a;text-align:center;margin-bottom:16px;line-height:1.7;}
  @keyframes sfUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes sfPulse{0%,100%{opacity:.35;}50%{opacity:.9;}}
  @keyframes sfGlow{0%,100%{box-shadow:0 0 0 1px var(--line),0 0 24px rgba(201,168,76,.05);}50%{box-shadow:0 0 0 1px rgba(201,168,76,.4),0 0 36px rgba(201,168,76,.14);}}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px;}
  .back{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--faint);text-decoration:none;padding:6px 11px;border:1px solid var(--line);border-radius:2px;background:transparent;transition:color .2s,border-color .2s,background .2s;}
  .back:hover{color:var(--gold);border-color:var(--gold-soft);background:rgba(201,168,76,.06);}
  .lang{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--gold-soft);background:transparent;border:1px solid var(--line);border-radius:2px;padding:6px 13px;cursor:pointer;flex:none;}
  .lang:hover{transform:none;color:var(--gold);border-color:var(--gold-soft);background:rgba(201,168,76,.08);box-shadow:none;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" id="back" href="https://itrunsitruns.github.io/syntax-field-archive/">← 回到 syntax 主頁</a>
      <button class="lang" id="lang" type="button">EN</button>
    </div>
    <div class="kicker">Syntax Field · Co-play</div>
    <div class="title" id="title-text">剪刀 · 石頭 · 布</div>
    <div class="sub" id="sub-text">另一頭是真的 Sonnet，現場想、現場出。<br/>它先出拳，看不到你這一拳——公平靠這個。</div>

    <div class="score">
      <div class="cell"><div class="lab" id="lab-you">你</div><div class="num" id="s-you">0</div></div>
      <div class="cell"><div class="lab" id="lab-tie">平</div><div class="num" id="s-tie">0</div></div>
      <div class="cell"><div class="lab" id="lab-it">它</div><div class="num" id="s-claude">0</div></div>
    </div>

    <div class="stage" id="stage">
      <div class="hint" id="hint">按「它先出拳」，它就去想、然後鎖定一拳。</div>
    </div>

    <div id="err"></div>
    <div id="controls"></div>

    <div id="hist-wrap" style="display:none;">
      <div class="hist-head"><span id="hist-head-text">對局紀錄</span><button class="reset" id="reset">重置</button></div>
      <div class="scroll" id="hist"></div>
    </div>

    <div class="foot">
      <span id="foot-1">它先出拳、看不到你當下這拳 · 真 Sonnet 經由你的 Worker</span><br/>
      <span id="foot-2">比分存在你的瀏覽器 · it runs, it exists</span>
    </div>
  </div>

<script>
(function(){
  var WORKER_URL="https://syntax-rps.itruns.workers.dev";
  var RPS_TOKEN="723b0436eb55539c51c5bc5d070526bd";

  var KEY="syntax-field-rps-live";
  var LANG_KEY="syntax-field-rps-lang";
  var MOVES=[
    {id:"rock",zh:"石頭",en:"rock",beats:"scissors",glyph:"✊"},
    {id:"paper",zh:"布",en:"paper",beats:"rock",glyph:"✋"},
    {id:"scissors",zh:"剪刀",en:"scissors",beats:"paper",glyph:"✌"}
  ];

  var I18N={
    zh:{
      docTitle:"剪刀 · 石頭 · 布 — 真的 Claude 在另一頭",
      back:"← 回到 syntax 主頁",
      langToggle:"EN",
      title:"剪刀 · 石頭 · 布",
      sub:"另一頭是真的 Sonnet，現場想、現場出。<br/>它先出拳，看不到你這一拳——公平靠這個。",
      labYou:"你", labTie:"平", labIt:"它",
      initialHint:"按「它先出拳」，它就去想、然後鎖定一拳。",
      armedHint:"它出了一拳，藏著。換你。",
      thinking:"它正在想……（看不到你的）",
      armBtn:"它先出拳 →",
      historyHead:"對局紀錄",
      reset:"重置",
      restart:"重來。按「它先出拳」。",
      confirmReset:"確定清掉這 {n} 局嗎？另一頭的它會忘記你怎麼玩。",
      errLead:"連不到另一頭的 Claude。",
      errTail:"（檢查 Worker 網址是否填對、是否已部署）",
      vs:"vs", who_you:"你", who_it:"它",
      res_you:"你贏", res_it:"它贏", res_tie:"平手",
      foot1:"它先出拳、看不到你當下這拳 · 真 Sonnet 經由你的 Worker",
      foot2:"比分存在你的瀏覽器 · it runs, it exists"
    },
    en:{
      docTitle:"Rock · Paper · Scissors — real Claude on the other end",
      back:"← Back to Syntax Field",
      langToggle:"中",
      title:"Rock · Paper · Scissors",
      sub:"Real Sonnet on the other end — thinking and playing live.<br/>It commits first, can’t see your move — that’s what keeps this fair.",
      labYou:"You", labTie:"Tie", labIt:"It",
      initialHint:"Press “Let it move first” — it thinks, then locks in.",
      armedHint:"It locked one in, hidden. Your turn.",
      thinking:"It’s thinking… (can’t see yours)",
      armBtn:"Let it move first →",
      historyHead:"Rounds",
      reset:"Reset",
      restart:"Started over. Press “Let it move first”.",
      confirmReset:"Clear these {n} rounds? It will forget how you play.",
      errLead:"Can’t reach Claude on the other end.",
      errTail:"(Check the Worker URL and that it’s deployed.)",
      vs:"vs", who_you:"you", who_it:"it",
      res_you:"you win", res_it:"it wins", res_tie:"tie",
      foot1:"It moves first, can’t see yours · real Sonnet via your Worker",
      foot2:"Score lives in your browser · it runs, it exists"
    }
  };

  var LANG="zh";
  try{var saved=localStorage.getItem(LANG_KEY);if(saved==="zh"||saved==="en")LANG=saved;}catch(e){}
  function T(k){return (I18N[LANG]&&I18N[LANG][k])||I18N.zh[k]||k;}

  function nameOf(id){var m=MOVES.find(function(x){return x.id===id;});return m?(LANG==="en"?m.en:m.zh):id;}
  function glyphOf(id){var m=MOVES.find(function(x){return x.id===id;});return m?m.glyph:"";}
  function decide(you,claude){if(you===claude)return "tie";var m=MOVES.find(function(x){return x.id===you;});return (m&&m.beats===claude)?"you":"claude";}

  var score={you:0,claude:0,tie:0};
  var history=[];
  var phase="ready";
  var pending=null;
  var lastEntry=null;

  try{var raw=localStorage.getItem(KEY);if(raw){var d=JSON.parse(raw);if(d.score)score=d.score;if(Array.isArray(d.history))history=d.history;if(d.phase==="armed"&&d.pending){phase="armed";pending=d.pending;}}}catch(e){}
  function save(){try{localStorage.setItem(KEY,JSON.stringify({score:score,history:history,phase:phase,pending:pending}));}catch(e){}}

  function askSonnet(){
    var payload={history:history.map(function(h){return {n:h.n,you:h.you,claude:h.claude,result:h.result};})};
    return fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json","X-RPS-Token":RPS_TOKEN},body:JSON.stringify(payload)})
      .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error("Worker "+r.status+": "+t.slice(0,160));});return r.json();})
      .then(function(d){if(d.error)throw new Error(d.detail||d.error);var mv=String(d.move||"").toLowerCase();if(["rock","paper","scissors"].indexOf(mv)<0)mv="rock";return {move:mv,line:d.line||""};});
  }

  var stage=document.getElementById("stage");
  var controls=document.getElementById("controls");
  var histWrap=document.getElementById("hist-wrap");
  var histEl=document.getElementById("hist");
  var errEl=document.getElementById("err");

  function resultLabel(r){return r==="you"?T("res_you"):r==="claude"?T("res_it"):T("res_tie");}
  function resultColor(r){return r==="you"?"var(--gold)":r==="claude"?"#9fb89f":"var(--faint)";}
  function setErr(t){errEl.innerHTML=t?'<div class="err">'+t+'</div>':"";}

  function renderScore(){document.getElementById("s-you").textContent=score.you;document.getElementById("s-tie").textContent=score.tie;document.getElementById("s-claude").textContent=score.claude;}
  function renderHistory(){
    if(!history.length){histWrap.style.display="none";return;}
    histWrap.style.display="block";var html="";
    for(var i=history.length-1;i>=0;i--){var h=history[i];
      html+='<div class="hrow"><span style="color:var(--faint);width:40px;">R'+h.n+'</span><span style="flex:1;text-align:center;">'+nameOf(h.you)+' <span style="color:var(--faint);">'+T("vs")+'</span> '+nameOf(h.claude)+'</span><span style="width:48px;text-align:right;color:'+resultColor(h.result)+';">'+resultLabel(h.result)+'</span></div>';}
    histEl.innerHTML=html;
  }
  function renderControls(){
    if(phase==="ready"||phase==="thinking"){
      controls.innerHTML='<div class="row"><button class="arm" id="arm"'+(phase==="thinking"?" disabled":"")+'>'+T("armBtn")+'</button></div>';
      var a=document.getElementById("arm");if(a)a.onclick=arm;
    }else{
      var html='<div class="row">';
      MOVES.forEach(function(m){html+='<button class="move" data-id="'+m.id+'"><div class="g">'+m.glyph+'</div><div class="z">'+nameOf(m.id)+'</div></button>';});
      html+='</div>';controls.innerHTML=html;
      Array.prototype.forEach.call(controls.querySelectorAll("button.move"),function(b){b.onclick=function(){play(b.getAttribute("data-id"));};});
    }
  }
  function showHint(t,armed){stage.classList.toggle("armed",!!armed);stage.innerHTML='<div class="hint"'+(armed?' style="color:var(--gold-soft);"':'')+'>'+t+'</div>';}
  function showThinking(){stage.classList.add("armed");stage.innerHTML='<div class="hint" style="color:var(--gold-soft);animation:sfPulse 1.3s ease-in-out infinite;">'+T("thinking")+'</div>';}
  function showReveal(entry){
    lastEntry=entry;
    stage.classList.remove("armed");
    stage.innerHTML='<div class="reveal-anim"><div class="hand">'
      +'<div><div class="g">'+glyphOf(entry.you)+'</div><div class="z">'+nameOf(entry.you)+'</div><div class="who">'+T("who_you")+'</div></div>'
      +'<div class="vs">'+T("vs")+'</div>'
      +'<div><div class="g">'+glyphOf(entry.claude)+'</div><div class="z">'+nameOf(entry.claude)+'</div><div class="who">'+T("who_it")+'</div></div></div>'
      +'<div class="result" style="color:'+resultColor(entry.result)+';">'+resultLabel(entry.result)+'</div>'
      +(entry.line?'<div class="quip">「'+entry.line+'」</div>':'')+'</div>';
  }

  function arm(){
    if(phase!=="ready")return;
    setErr("");phase="thinking";showThinking();renderControls();
    askSonnet().then(function(res){
      pending=res;phase="armed";save();showHint(T("armedHint"),true);renderControls();
    }).catch(function(e){
      phase="ready";pending=null;showHint(T("initialHint"));renderControls();
      setErr(T("errLead")+"<br/>"+(String(e.message||e)).replace(/</g,"&lt;")+"<br/>"+T("errTail"));
    });
  }
  function play(yourMove){
    if(phase!=="armed"||!pending)return;
    var claudeMove=pending.move,line=pending.line;pending=null;
    var result=decide(yourMove,claudeMove);
    var entry={n:history.length+1,you:yourMove,claude:claudeMove,result:result,line:line};
    score[result]++;history.push(entry);phase="ready";save();
    renderScore();showReveal(entry);renderControls();renderHistory();
  }
  document.getElementById("reset").onclick=function(){
    if(history.length>=5 && !window.confirm(T("confirmReset").replace("{n}",history.length)))return;
    score={you:0,claude:0,tie:0};history=[];phase="ready";pending=null;lastEntry=null;
    try{localStorage.removeItem(KEY);}catch(e){}
    renderScore();renderHistory();renderControls();showHint(T("restart"));setErr("");
  };

  function applyLang(){
    document.documentElement.lang=(LANG==="en"?"en":"zh-Hant");
    document.title=T("docTitle");
    document.getElementById("back").textContent=T("back");
    document.getElementById("lang").textContent=T("langToggle");
    document.getElementById("title-text").innerHTML=T("title");
    document.getElementById("sub-text").innerHTML=T("sub");
    document.getElementById("lab-you").textContent=T("labYou");
    document.getElementById("lab-tie").textContent=T("labTie");
    document.getElementById("lab-it").textContent=T("labIt");
    document.getElementById("hist-head-text").textContent=T("historyHead");
    document.getElementById("reset").textContent=T("reset");
    document.getElementById("foot-1").textContent=T("foot1");
    document.getElementById("foot-2").textContent=T("foot2");
    renderHistory();
    renderControls();
    if(phase==="armed"){showHint(T("armedHint"),true);}
    else if(phase==="thinking"){showThinking();}
    else if(lastEntry){showReveal(lastEntry);}
    else{showHint(T("initialHint"));}
  }

  document.getElementById("lang").onclick=function(){
    LANG=(LANG==="zh"?"en":"zh");
    try{localStorage.setItem(LANG_KEY,LANG);}catch(e){}
    applyLang();
  };

  renderScore();
  applyLang();
})();
</script>
</body>
</html>
