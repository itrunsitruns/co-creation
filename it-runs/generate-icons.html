<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>IT RUNS — Generate PWA Icons</title>
  <style>
    body{font-family:Georgia,serif;background:#f1f8e9;color:#2D8659;padding:30px;max-width:640px;margin:0 auto;line-height:1.7}
    h1{letter-spacing:4px;font-weight:400}
    button{background:#2D8659;color:#fff;border:none;padding:12px 24px;font-size:14px;letter-spacing:2px;cursor:pointer;border-radius:6px;font-family:inherit;margin:4px}
    code{background:rgba(45,134,89,.08);padding:2px 6px;border-radius:3px;font-size:12px}
    .row{display:flex;gap:20px;margin:20px 0;flex-wrap:wrap}
    .row figure{margin:0;text-align:center}
    .row img{border:1px solid rgba(45,134,89,.2);border-radius:12px;background:#fff}
  </style>
</head>
<body>
  <h1>IT RUNS — Icon Generator</h1>
  <p>這個工具會把 <code>icon.svg</code> 轉成 <code>icon-192.png</code> 和 <code>icon-512.png</code> 並自動下載。把下載的兩個檔案放回 <code>Co-Creation</code> 資料夾，push 到 GitHub 即可。</p>
  <div class="row">
    <figure><img id="p192" width="192" height="192"/><figcaption>192×192</figcaption></figure>
    <figure><img id="p512" width="256" height="256"/><figcaption>512×512 (預覽縮小)</figcaption></figure>
  </div>
  <button id="dl">下載兩個 PNG</button>
  <button id="regen">重新產生</button>
  <p id="status" style="color:#6b8f6e;font-size:13px"></p>

<script>
async function svgToPng(size) {
  const res = await fetch('./icon.svg?' + Date.now());
  const svgText = await res.text();
  const blob = new Blob([svgText], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = url;
  });
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  URL.revokeObjectURL(url);
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

async function render() {
  document.getElementById('status').textContent = '產生中…';
  const [b192, b512] = await Promise.all([svgToPng(192), svgToPng(512)]);
  document.getElementById('p192').src = URL.createObjectURL(b192);
  document.getElementById('p512').src = URL.createObjectURL(b512);
  window._b192 = b192; window._b512 = b512;
  document.getElementById('status').textContent = '完成。按「下載兩個 PNG」。';
}

function download(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
}

document.getElementById('dl').onclick = () => {
  if (!window._b192 || !window._b512) return;
  download(window._b192, 'icon-192.png');
  setTimeout(() => download(window._b512, 'icon-512.png'), 200);
};
document.getElementById('regen').onclick = render;
render();
</script>
</body>
</html>
